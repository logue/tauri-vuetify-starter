packages:
  - frontend
  - docs

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  core-js: true
  esbuild: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - js-yaml@4.1.1
  - fast-xml-builder@1.1.7
  - fast-uri@3.1.1
  - fast-uri@3.1.2

onlyBuiltDependencies:
  - '@parcel/watcher'
  - better-sqlite3
  - core-js
  - esbuild
  - unrs-resolver
  - vue-demi

overrides:
  fast-uri@<=3.1.0: ^3.1.1
  fast-uri@<=3.1.1: ^3.1.2
  fast-xml-builder@<=1.1.6: ^1.1.7
  js-yaml@>=4.0.0 <4.1.1: ^4.1.1
